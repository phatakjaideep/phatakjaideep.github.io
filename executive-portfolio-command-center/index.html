<script>
// Brand Style Guide v1.1 — amber header/footer accent.
// Purely additive: does not modify the app bundle above. Polls the rendered
// DOM after mount and applies inline border accents to the header bar and
// footer signature block. Safe no-op if the app's markup ever changes shape.
(function () {
  function applyBrandAccent() {
    var footerDone = false, headerDone = false;

    var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
    var node;
    while ((node = walker.nextNode())) {
      if (node.textContent.indexOf('Created by Jaideep Phatak') !== -1) {
        var el = node.parentElement && node.parentElement.parentElement;
        if (el && el.style) {
          el.style.borderTop = '2px solid rgba(212,137,26,0.4)';
          footerDone = true;
        }
        break;
      }
    }

    var divs = document.querySelectorAll('div');
    for (var i = 0; i < divs.length; i++) {
      var d = divs[i];
      var cs = window.getComputedStyle(d);
      var rect = d.getBoundingClientRect();
      if (cs.position === 'sticky' && parseInt(cs.top, 10) === 0 &&
          rect.top < 5 && d.offsetHeight > 40 && d.offsetHeight < 100) {
        d.style.borderTop = '3px solid #D4891A';
        headerDone = true;
        break;
      }
    }

    return footerDone && headerDone;
  }

  var tries = 0;
  var iv = setInterval(function () {
    tries++;
    if (applyBrandAccent() || tries > 40) clearInterval(iv);
  }, 250);
})();
